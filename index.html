<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Marsala Fashion — Ateliê</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: var(--font-body); }

    :root {
      --marsala: #7a2336;
      --marsala-soft: #d8a8a0;
      --ink: #1c1410;
      --ink-2: #3a2f28;
      --paper: #faf6f0;
      --bg-soft: #f5f1eb;
      --line: #e7ddd0;
      --rose: #d8a8a0;

      --font-display: 'Instrument Serif', serif;
      --font-body: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Geist Mono', monospace;
    }

    body { color: var(--ink); }

    /* Typography */
    .h-display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.02em; }
    .h-display em { font-style: italic; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-2); opacity: 0.6; }

    /* Buttons */
    .btn {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { opacity: 0.8; }
    .btn.lg { padding: 16px 32px; font-size: 15px; }
    .btn.ghost { border-color: transparent; }
    .btn .arrow { display: inline-block; transition: transform 0.2s; }
    .btn:hover .arrow { transform: translateX(2px); }

    /* Header */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 56px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header.on-dark { background: rgba(28,20,16,.95); color: var(--paper); border-color: rgba(250,246,240,.1); }
    .site-header.on-dark a { color: var(--paper); }

    .logo { font-family: var(--font-display); font-size: 24px; font-weight: 400; letter-spacing: -0.02em; }
    .logo em { font-style: italic; color: var(--marsala); }
    .site-header.on-dark .logo em { color: var(--rose); }

    .nav { display: flex; gap: 32px; }
    .nav a { font-size: 14px; color: var(--ink); text-decoration: none; border-bottom: 2px solid transparent; padding-bottom: 4px; transition: border-color 0.2s; }
    .nav a:hover { border-color: var(--line); }

    .actions { display: flex; gap: 24px; align-items: center; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; color: var(--ink); font-size: 12px; font-weight: 500; transition: opacity 0.2s; position: relative; }
    .icon-btn:hover { opacity: 0.6; }
    .site-header.on-dark .icon-btn { color: var(--paper); }
    .cart-count { position: absolute; top: -4px; right: -4px; background: var(--marsala); color: var(--paper); font-size: 10px; font-weight: 600; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    /* Footer */
    .site-footer {
      display: grid;
      grid-template-columns: 2fr repeat(3, 1fr);
      gap: 64px;
      padding: 80px 56px;
      background: var(--ink);
      color: var(--paper);
      border-top: 1px solid rgba(250,246,240,.1);
      margin-top: 120px;
    }
    .site-footer .brand { font-family: var(--font-display); font-size: 32px; }
    .site-footer .brand em { font-style: italic; color: var(--rose); }
    .site-footer h4 { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 16px; }
    .site-footer ul { list-style: none; padding: 0; margin: 0; }
    .site-footer li { margin-bottom: 8px; }
    .site-footer a { color: rgba(250,246,240,.65); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .site-footer a:hover { color: var(--paper); }
    .site-footer .small { font-size: 11px; color: rgba(250,246,240,.4); margin-top: 24px; }

    /* Product Card */
    .pcard { cursor: pointer; }
    .pcard .pimg { position: relative; border-radius: 2px; }
    .pcard .quick { display: none; position: absolute; inset: 0; background: rgba(28,20,16,.8); color: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; }
    .pcard:hover .quick { opacity: 1; }
    .pcard .pmeta { padding: 12px 0; display: flex; justify-content: space-between; align-items: flex-end; }
    .pcard .pname { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .pcard .pprice { font-size: 13px; color: var(--ink-2); }
    .pcard .swatches { display: flex; gap: 6px; }
    .pcard .swatches span { width: 12px; height: 12px; border-radius: 2px; border: 1px solid var(--line); }

    .gblock { position: relative; display: flex; align-items: flex-end; justify-content: flex-start; padding: 40px; border-radius: 2px; }
    .gblock .tag { background: rgba(250,246,240,.9); color: var(--ink); font-size: 10px; font-weight: 600; letter-spacing: 0.05em; padding: 6px 10px; border-radius: 2px; }

    /* Marquee */
    .marquee {
      background: var(--marsala);
      color: var(--paper);
      padding: 16px 0;
      overflow: hidden;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .marquee-content { display: flex; gap: 48px; animation: scroll 30s linear infinite; white-space: nowrap; padding: 0 56px; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(28,20,16,.7); z-index: 200; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--paper); padding: 60px 56px; border-radius: 2px; max-width: 480px; width: 90%; }
    .modal h2 { margin: 0 0 24px; font-family: var(--font-display); font-size: 32px; }
    .modal input, .modal textarea { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid var(--line); background: var(--bg-soft); font-family: var(--font-body); }
    .modal button { width: 100%; padding: 12px; background: var(--marsala); color: var(--paper); border: none; cursor: pointer; font-weight: 500; margin-top: 8px; }
    .modal button:hover { opacity: 0.9; }
    .modal .close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; }

    /* Grid */
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; padding: 64px 56px; }
    .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; padding: 40px 56px; }

    /* Responsivo */
    @media (max-width: 768px) {
      .site-header { padding: 16px 20px; }
      .nav { gap: 16px; font-size: 12px; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 32px 20px; }
      .grid-6 { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
      .site-footer { grid-template-columns: 1fr; gap: 32px; padding: 40px 20px; }
      .h-display { font-size: 24px !important; }
    }
  </style>
</head>
<body>

      return (

    // ═══════════════════════════════════════════════════════
    // HOME COMPONENT
    // ═══════════════════════════════════════════════════════

            <div style={{ display: 'flex', justifyContent: 'space-between' }}>

                </p>
                <div style={{ display: 'flex', gap: 12 }}>
                  <button className="btn lg" style={{ background: '#faf6f0', color: '#1c1410', borderColor: '#faf6f0' }}>Comprar <span className="arrow">→</span></button>
                  <button className="btn lg ghost" style={{ color: '#faf6f0', borderColor: 'rgba(250,246,240,.4)' }}>Lookbook</button>
                </div>
              </div>
            </div>

          <Marquee items={['Frete grátis acima de R$ 600', 'Até 10x sem juros', 'Devolução em 30 dias']} />

          {/* Categorias */}
          <section style={{ padding: '60px 0' }}>
            <div style={{ padding: '0 56px', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 40 }}>

    // ═══════════════════════════════════════════════════════
    // LOGIN MODAL
    // ═══════════════════════════════════════════════════════

    function LoginModal({ open, onClose, onLogin }) {
      const [tab, setTab] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');

      const handleLogin = () => {
        if (!email || !password) {
          alert('Preencha todos os campos!');
          return;
        }
        const users = JSON.parse(localStorage.getItem('marsalaUsers')) || [];
        const user = users.find(u => u.email === email && u.password === password);

        if (user) {
          const currentUser = { id: user.id, email: user.email, name: user.name };
          localStorage.setItem('marsalaUser', JSON.stringify(currentUser));
          onLogin(currentUser);
          onClose();
        } else {
          alert('Email ou senha incorretos!');
        }
      };

      const handleRegister = () => {
        if (!name || !email || !password) {
          alert('Preencha todos os campos!');
          return;
        }
        const users = JSON.parse(localStorage.getItem('marsalaUsers')) || [];
        if (users.find(u => u.email === email)) {
          alert('Email já cadastrado!');
          return;
        }
        const newUser = { id: Date.now(), name, email, password };
        users.push(newUser);
        localStorage.setItem('marsalaUsers', JSON.stringify(users));
        const currentUser = { id: newUser.id, email: newUser.email, name: newUser.name };
        localStorage.setItem('marsalaUser', JSON.stringify(currentUser));
        onLogin(currentUser);
        onClose();
      };

      return (
        <div className="modal" style={{ display: open ? 'flex' : 'none' }}>
          <div className="modal-content" style={{ position: 'relative' }}>
            <button className="close" onClick={onClose}>×</button>
            <h2>{tab === 'login' ? 'Bem-vinda de volta' : 'Crie sua conta'}</h2>

            {tab === 'register' && (
              <input
                type="text"
                placeholder="Seu nome"
                value={name}
                onChange={(e) => setName(e.target.value)}
              />
            )}
            <input
              type="email"
              placeholder="Email"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
            />
            <input
              type="password"
              placeholder="Senha"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
            />

            <button onClick={tab === 'login' ? handleLogin : handleRegister}>
              {tab === 'login' ? 'Entrar' : 'Cadastrar'}
            </button>

            <p style={{ textAlign: 'center', fontSize: 13, marginTop: 20 }}>
              {tab === 'login' ? "Não tem conta? " : "Já tem conta? "}
              <button
                style={{
                  background: 'none',
                  border: 'none',
                  color: '#7a2336',
                  cursor: 'pointer',
                  textDecoration: 'underline',
                  fontWeight: 500
                }}
                onClick={() => {
                  setTab(tab === 'login' ? 'register' : 'login');
                  setEmail('');
                  setPassword('');
                  setName('');
                }}
              >
                {tab === 'login' ? 'Cadastre-se' : 'Faça login'}
              </button>
            </p>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [loginOpen, setLoginOpen] = useState(false);
      const [cartCount, setCartCount] = useState(2);

      useEffect(() => {
        const saved = localStorage.getItem('marsalaUser');
        if (saved) setCurrentUser(JSON.parse(saved));
      }, []);

      return (
        <>
          <Header
            currentUser={currentUser}
            onCart={() => console.log('Cart')}
            onLogin={() => setLoginOpen(true)}
            onLogout={() => {
              localStorage.removeItem('marsalaUser');
              setCurrentUser(null);
            }}
            cartCount={cartCount}
          />
          <Home />
          <Footer />
          <LoginModal
            open={loginOpen}
            onClose={() => setLoginOpen(false)}
            onLogin={(user) => setCurrentUser(user)}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
